# NexusRAG — Dev services only (PostgreSQL + ChromaDB + RabbitMQ)
# Usage: docker compose -f docker-compose.services.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusrag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusrag
    ports:
      - "5433:5432"
    volumes:
      - nexusrag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: nexusrag-chromadb
    ports:
      - "8002:8000"
    volumes:
      - nexusrag_chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexusrag-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - nexusrag_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: nexusrag-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Webhook notification target (used in production / full docker-compose.yml)
      # Not active here since there's no backend container in this services-only compose.
      # Use MINIO_WEBHOOK_ENABLED=false in .env for local dev (direct publish after upload).
      MINIO_NOTIFY_WEBHOOK_ENABLE_NEXUSRAG: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_NEXUSRAG: "http://host.docker.internal:8080/api/v1/minio/events"
    volumes:
      - nexusrag_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: nexusrag-neo4j
    ports:
      - "7474:7474"   # Browser UI → http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/nexusrag123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - nexusrag_neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  nexusrag_postgres_data:
  nexusrag_chroma_data:
  nexusrag_rabbitmq_data:
  nexusrag_minio_data:
  nexusrag_neo4j_data:
